<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --background: #f7f8fa;
            --white: #fff;
            --input-border: #ced4da;
            --input-focus: #80bdff;
            --error: #dc3545;
            --success: #28a745;
            --font-stack: 'Segoe UI', 'Helvetica Neue', Arial, 'Liberation Sans', sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: var(--font-stack);
            background: var(--background);
        }

        main {
            max-width: 380px;
            margin: 5vw auto;
            padding: 2rem 2.5rem 2.5rem 2.5rem;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 32px 0 rgba(30,34,70,0.10), 0 1.5px 12px 0 rgba(30,34,70,0.04);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 2rem;
            color: var(--primary);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        label {
            font-size: 1rem;
            font-weight: 500;
            color: #222a3d;
            margin-bottom: 0.33em;
            display: inline-block;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.66em 0.9em;
            border: 1.5px solid var(--input-border);
            border-radius: 4px;
            font-size: 1rem;
            background: var(--white);
            margin-top: 0.22em;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--input-focus);
            outline: none;
            background: #eaf3ff;
        }

        button[type="submit"] {
            width: 100%;
            padding: 0.75em 0;
            background: var(--primary);
            color: var(--white);
            font-size: 1.08rem;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 0.5em;
            transition: background 0.18s;
        }

        button[type="submit"]:hover,
        button[type="submit"]:focus {
            background: var(--primary-hover);
        }

        #message {
            min-height: 1.6em;
            margin-top: 1em;
            text-align: center;
            font-size: 1rem;
            color: var(--error);
            transition: color 0.2s;
        }

        #message.success {
            color: var(--success);
        }

        @media (max-width: 500px) {
            main {
                max-width: 94vw;
                padding: 1.1rem 0.7rem 1.2rem 0.7rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Login</h1>

        <form id="loginForm" method="post" novalidate aria-describedby="message">
            <div>
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    required
                />
            </div>

            <div>
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                />
            </div>

            <button type="submit">Login</button>
        </form>

        <div id="message" role="status" aria-live="polite"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
