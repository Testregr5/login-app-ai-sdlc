<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
</head>
<body>
    <main>
        <h1>Login</h1>

        <section id="loginSection" aria-label="Login">
            <form id="loginForm" method="post" novalidate aria-describedby="loginMessage">
                <div>
                    <label for="username">Username</label><br />
                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                    />
                </div>

                <br />

                <div>
                    <label for="password">Password</label><br />
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    />
                </div>

                <br />

                <button type="submit">Login</button>
            </form>

            <p id="loginMessage" role="status" aria-live="polite"></p>
        </section>

        <section id="appSection" aria-label="App" hidden>
            <p id="message" role="status" aria-live="polite"></p>
            <button type="button" id="logoutBtn">Logout</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
